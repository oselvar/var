[project]
name = "pytest-varar"
version = "0.5.1"
description = "pytest plugin for Markdown-native BDD"
requires-python = ">=3.11"
license = "MIT"
dependencies = ["varar==0.5.1", "varar-config==0.5.1", "varar-core==0.5.1", "varar-runner==0.5.1", "pytest>=8"]

[project.entry-points.pytest11]
var = "varar_pytest.plugin"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/varar_pytest"]
