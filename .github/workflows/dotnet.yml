name: .NET

on:
  push:
    branches: [main]
    paths:
      - 'dotnet/**'
      - 'conformance/**'
      - 'examples/**'
      - '.github/workflows/dotnet.yml'
  pull_request:
    paths:
      - 'dotnet/**'
      - 'conformance/**'
      - 'examples/**'
      - '.github/workflows/dotnet.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # The SDK version is never written here — it comes from the repo-root
      # .tool-versions, the same pin `make install-tools` installs locally, so
      # CI and a developer machine cannot drift apart.
      - name: Toolchain pin
        id: pin
        run: echo "dotnet=$(awk '/^dotnet /{print $2; exit}' .tool-versions)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: ${{ steps.pin.outputs.dotnet }}

      # The solution: format check + build + test (four conformance artifacts x
      # 15 bundles + the config corpus + drift + runner). The C# step fixtures
      # for the registry/plan/trace gates live in conformance/bundles.
      - run: dotnet format --verify-no-changes && dotnet test
        working-directory: dotnet

      # The standalone consumer sample: dotnet test discovers and runs one test per
      # Markdown example through the VSTest adapter, with no user wiring.
      - run: dotnet test
        working-directory: examples/csharp-vstest
