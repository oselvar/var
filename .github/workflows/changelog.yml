name: Changelog

# CHANGELOG.md is generated from conventional commit messages (cliff.toml).
# On every push to main: lint the new commit messages, then refresh the
# [Unreleased] section so consumers can read what's coming before a release.
# The bot's own commit is a `chore`, which cliff.toml skips — and pushes made
# with GITHUB_TOKEN never retrigger workflows, so this cannot loop.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: changelog

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # git-cliff and the lint need full history + tags

      - name: Lint commit messages
        run: release/lint-commits.sh

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Regenerate CHANGELOG.md
        run: release/changelog.sh

      - name: Commit and push when changed
        run: |
          git diff --quiet CHANGELOG.md && { echo "changelog unchanged"; exit 0; }
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore(release): refresh changelog [skip ci]"
          # A push may have landed while this job ran; rebase and retry once.
          git push origin main || { git pull --rebase origin main && git push origin main; }
