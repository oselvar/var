name: Java

on:
  push:
    branches: [main]
    paths:
      - 'java/**'
      - 'conformance/**'
      - '.github/workflows/java.yml'
  pull_request:
    paths:
      - 'java/**'
      - 'conformance/**'
      - '.github/workflows/java.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - run: mvn --batch-mode verify
