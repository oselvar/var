name: Java

on:
  push:
    branches: [main]
    paths:
      - 'java/**'
      - 'conformance/**'
      - 'examples/**'
      - '.github/workflows/java.yml'
  pull_request:
    paths:
      - 'java/**'
      - 'conformance/**'
      - 'examples/**'
      - '.github/workflows/java.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java
    steps:
      - uses: actions/checkout@v7

      # The JDK version is never written here — it comes from the repo-root
      # .tool-versions, the same pin `make install-tools` installs locally, so
      # CI and a developer machine cannot drift apart.
      - name: Toolchain pin
        id: pin
        working-directory: .
        run: |
          v=$(awk '/^java /{print $2; exit}' .tool-versions)
          echo "distribution=${v%%-*}" >> "$GITHUB_OUTPUT"
          echo "java=$(echo "${v#*-}" | cut -d. -f1)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@v5
        with:
          distribution: ${{ steps.pin.outputs.distribution }}
          java-version: ${{ steps.pin.outputs.java }}
          cache: maven

      # install, not verify: the sample projects below resolve the workspace's
      # SNAPSHOT from the local repository (mavenLocal).
      - run: mvn --batch-mode install

      # Standalone sample projects (see examples/):
      # they consume the SNAPSHOT installed above, so they gate trunk.
      - run: mvn --batch-mode test
        working-directory: examples/java-junit-maven

      - run: ./gradlew --console=plain test
        working-directory: examples/java-junit-gradle

      - run: ./gradlew --console=plain test
        working-directory: examples/kotlin-junit

      - run: ./gradlew --console=plain test
        working-directory: examples/kotlin-kotest
